{% extends 'dashboard/base_dashboard.html' %}

{% block page_title %}
Settings
{% endblock %}


{% block content %}

<div class="container-fluid">

    <h3 class="mb-4">
        ⚙️ System Settings
    </h3>



    <div class="row">


        <!-- Monitoring Settings -->

        <div class="col-md-6">


            <div class="card shadow mb-4">


                <div class="card-header">
                    📡 Monitoring Configuration
                </div>


                <div class="card-body">


                    <form method="POST">

                        {% csrf_token %}


                        <div class="form-check mb-3">

                            <input
                            class="form-check-input"
                            type="checkbox"
                            name="packet_capture"
                            checked
                            >

                            <label class="form-check-label">

                                Enable Packet Capture

                            </label>

                        </div>



                        <div class="form-check mb-3">

                            <input
                            class="form-check-input"
                            type="checkbox"
                            name="threat_detection"
                            checked
                            >

                            <label class="form-check-label">

                                Enable Threat Detection

                            </label>

                        </div>




                        <div class="form-check mb-3">

                            <input
                            class="form-check-input"
                            type="checkbox"
                            name="machine_learning"
                            checked
                            >

                            <label class="form-check-label">

                                Enable Machine Learning Detection

                            </label>

                        </div>




                        <button class="btn btn-primary">

                            Save Settings

                        </button>


                    </form>


                </div>


            </div>


        </div>





        <!-- Notification Settings -->


        <div class="col-md-6">


            <div class="card shadow mb-4">


                <div class="card-header">

                    🔔 Notification Settings

                </div>



                <div class="card-body">


                    <form method="POST">


                        {% csrf_token %}


                        <div class="form-group mb-3">


                            <label>
                                Alert Email
                            </label>


                            <input
                            type="email"
                            class="form-control"
                            name="alert_email"
                            placeholder="admin@example.com"
                            >


                        </div>




                        <div class="form-check mb-3">


                            <input
                            class="form-check-input"
                            type="checkbox"
                            name="email_alerts"
                            checked
                            >


                            <label class="form-check-label">

                                Enable Email Alerts

                            </label>


                        </div>




                        <button class="btn btn-success">

                            Save Notification Settings

                        </button>


                    </form>


                </div>


            </div>


        </div>



    </div>


</div>


{% endblock %}
